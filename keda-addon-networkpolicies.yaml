##
# NetworkPolicies for the KEDA HTTP add-on components
# (scaler, interceptor, operator)
##

# ── Scaler: allow egress to API server ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keda-add-ons-http-scaler-allow-to-apiserver
  namespace: kyma-system
  labels:
    app.kubernetes.io/component: scaler
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/part-of: keda
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: add-on
      app.kubernetes.io/instance: external-scaler
      app.kubernetes.io/name: http
      app.kubernetes.io/part-of: keda
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 443
      protocol: TCP
    - port: 6443
      protocol: TCP
---
# ── Scaler: allow egress to DNS ──
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: keda-add-ons-http-scaler-allow-to-dns
  namespace: kyma-system
  labels:
    app.kubernetes.io/component: scaler
    app.kubernetes.io/name: http-add-on
    app.kubernetes.io/part-of: keda
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: add-on
      app.kubernetes.io/instance: external-scaler
      app.kubernetes.io/name: http
      app.kubernetes.io/part-of: keda
  policyTypes:
  - Egress
  egress:
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
    to:
    - ipBlock:
        cidr: 0.0.0.0/0
---
