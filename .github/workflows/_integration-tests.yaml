name: integration tests

on:
  workflow_call:
    inputs:
      image:
        description: "The image to test"
        required: true
        type: string

jobs:
  integration-test:
    if: ${{ !startsWith(github.event_name, 'pull_request') || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: kyma-project/manager-toolkit/.github/actions/setup-go@main
      - uses: kyma-project/manager-toolkit/.github/actions/create-k3d-cluster@main
      - name: run test
        run: make -C hack/ci integration-test-on-cluster
        env:
          IMG: ${{ inputs.image }}

  btp-integration-tests:
    if: ${{ !startsWith(github.event_name, 'pull_request') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: compute github commit sha
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - uses: kyma-project/terraform-module/.github/actions/create-sap-btp-kyma@1.0.0
        id: create-btp-resources
        with:
          btp_subaccount_name: keda-test-${{ steps.vars.outputs.sha_short }}-${{ github.run_attempt }}
          btp_backend_url: "${{ secrets.BTP_BACKEND_URL}}"
          btp_user: "${{ secrets.BTP_BOT_USER}}"
          btp_password: "${{ secrets.BTP_BOT_PASSWORD}}"
          btp_global_account: "${{ secrets.BTP_GLOBAL_ACCOUNT }}"
          btp_idp_tenant: "${{ secrets.BTP_CUSTOM_IAS_TENANT }}"
          btp_subaccount_region: "${{ secrets.BTP_SUBACCOUNT_REGION }}"
          btp_kyma_region: "${{ secrets.BTP_KYMA_REGION }}"
          btp_kyma_plan: "${{ secrets.BTP_KYMA_PLAN }}"

      - name: Run Keda Manager's integration test
        run: |
          KUBECONFIG=${KUBECONFIG} make -C hack/ci integration-test-on-cluster
        env:
          IMG: ${{ inputs.image }}

      - uses: kyma-project/terraform-module/.github/actions/force-delete-sap-btp-subaccount@1.0.0
        if: always()
        with:
          btp_subaccount_id: ${{ steps.create-btp-resources.outputs.subaccount_id }}
          btp_backend_url: ${{ secrets.BTP_BACKEND_URL}}
          btp_user: ${{ secrets.BTP_BOT_USER}}
          btp_password: ${{ secrets.BTP_BOT_PASSWORD}}
          btp_global_account: ${{ secrets.BTP_GLOBAL_ACCOUNT }}
          btp_idp_tenant: ${{ secrets.BTP_CUSTOM_IAS_TENANT }}

  rbac-integration-test:
    if: ${{ !startsWith(github.event_name, 'pull_request') || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
      - uses: kyma-project/manager-toolkit/.github/actions/setup-go@main
      - uses: kyma-project/manager-toolkit/.github/actions/create-k3d-cluster@main
      - name: deploy keda
        run: |
          kubectl create namespace kyma-system || true
          make deploy
        env:
          IMG: ${{ inputs.image }}
      - name: run rbac tests
        uses: kyma-project/manager-toolkit/.github/actions/test-rbac-propagation@main
        with:
          config: ${{ github.workspace }}/test/rbac/config.yaml
      - name: enable addon and verify pods
        run: |
          # Enable the HTTP add-on via annotation on the Keda CR
          kubectl annotate keda default -n kyma-system \
            keda.kyma-project.io/addon-enabled=true \
            keda.kyma-project.io/addon-version=0.13.0 \
            --overwrite

          # Wait for addon deployments to become available in the keda namespace
          echo "Waiting for addon namespace and deployments..."
          for i in $(seq 1 30); do
            DEPLOYS=$(kubectl get deploy -n keda --no-headers 2>/dev/null | wc -l)
            if [ "$DEPLOYS" -gt 0 ]; then
              break
            fi
            echo "  attempt $i: no deployments yet in namespace keda"
            sleep 10
          done

          kubectl wait --for=condition=Available deployment --all -n keda --timeout=180s

          # Verify all addon pods are Running and Ready
          kubectl wait --for=condition=Ready pod --all -n keda --timeout=120s

          # Verify the Addon condition on the Keda CR
          kubectl get keda default -n kyma-system -o jsonpath='{.status.conditions[?(@.type=="Addon")].status}' | grep -q "True"
          echo "Addon integration test passed"

          # Disable the addon
          kubectl annotate keda default -n kyma-system \
            keda.kyma-project.io/addon-enabled=false \
            --overwrite
