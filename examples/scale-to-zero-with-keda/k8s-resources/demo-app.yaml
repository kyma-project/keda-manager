apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-echo
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-echo
  template:
    metadata:
      labels:
        app: http-echo
    spec:
      containers:
      - name: http-echo
        image: node:22-alpine
        ports:
        - containerPort: 8080
        command:
        - node
        - -e
        - |
          const http = require("http");
          const server = http.createServer((req, res) => {
            let body = "";
            req.on("data", chunk => body += chunk);
            req.on("end", () => {
              const response = {
                timestamp: new Date().toISOString(),
                pod: process.env.HOSTNAME || "unknown",
                body: body || null,
                message: "Request handled successfully by KEDA HTTP Add-on demo"
              };
              res.writeHead(200, { "Content-Type": "application/json" });
              res.end(JSON.stringify(response, null, 2));
            });
          });
          server.listen(8080, () => console.log("Listening on port 8080"));
---
apiVersion: v1
kind: Service
metadata:
  name: http-echo
  namespace: demo-app
spec:
  selector:
    app: http-echo
  ports:
  - port: 8080
    targetPort: 8080
