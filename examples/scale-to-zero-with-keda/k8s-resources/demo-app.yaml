apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-echo
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-echo
  template:
    metadata:
      labels:
        app: http-echo
    spec:
      containers:
      - name: http-echo
        image: hashicorp/http-echo:0.2.3
        args:
        - "-listen=:8080"
        - "-text=Hello from KEDA HTTP Add-on!"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: http-echo
  namespace: demo-app
spec:
  selector:
    app: http-echo
  ports:
  - port: 8080
    targetPort: 8080
